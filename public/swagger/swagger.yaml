openapi: 3.0.0
info:
  title: Mini Order Management API
  description: Build a small backend system where users can create products and place orders using REST APIs.
  version: 1.0.0

servers:
  - url: http://localhost:8000/api/v1
    # - url: "{{ config('app.url') }}"
    description: "Localhost address"
tags:
  - name: User Authentication
    description: Operations about Authentication

  - name: Product Management
    description: CRUD APIs for products

  - name: Order System
    description: Everything about your order

paths:
  /orders:
    get:
      tags:
        - Order System
      summary: Get order details
      description: Get all Order
      operationId: getAllOrder
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search keyword (default empty string)
        - in: query
          name: pageIndex
          schema:
            type: integer
            default: 0
          description: Page index (default 0)
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 3
          description: Page size (default 3)
        - in: query
          name: sortBy
          schema:
            type: string
            default: id
          description: Attribute to sort by (default 'id')
        - in: query
          name: sortDirection
          schema:
            type: string
            default: ASC
          description: Sort direction (default 'ASC')
      responses:
        "200":
          description: Order All Retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Unauthenticated
        "500":
          description: Error
      security:
        - bearerAuth: []
    post:
      tags:
        - Order System
      summary: Create order
      description: New Order to the store
      operationId: storeOrder
      requestBody:
        description: New Order in the store
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                quantity:
                  type: number
                  example: 1
                total_price:
                  type: string
                  description: Total Price
                  example: 1000
                status:
                  type: string
                  description: Status
                  example: shipped
                  enum:
                    - processing
                    - shipped
                    - delivered
                    - pending
      responses:
        "201":
          description: Order Create
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Unauthenticated
        "404":
          description: Order not found
        "405":
          description: Validation exception
      security:
        - bearerAuth: []

  /orders/{id}:
    get:
      tags:
        - Order System
      summary: Get single order
      description: Returns a single Order
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          description: ID of Order to return
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order Retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Unauthenticated
        "404":
          description: Order not found
      security:
        - bearerAuth: []
    put:
      tags:
        - Order System
      summary: Update an existing Order
      description: Update an  existing Order by Id
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          description: ID of Order to update
          required: true
          schema:
            type: integer
      requestBody:
        description: Update an existent Order in the store
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                total_price:
                  type: string
                  description: Total Price
                  example: 1000
                status:
                  type: string
                  description: Status
                  example: shipped
                  enum:
                    - processing
                    - shipped
                    - delivered
                    - pending
      responses:
        "200":
          description: Order Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Unauthenticated
        "404":
          description: Order not found
        "405":
          description: Validation exception
      security:
        - bearerAuth: []
    patch:
      tags:
        - Order System
      summary: Update an existing Order
      description: Partial Update an existing Order by Id
      operationId: updatePatchOrder
      parameters:
        - name: id
          in: path
          description: ID of Order to update
          required: true
          schema:
            type: integer
      requestBody:
        description: Update an existent Order in the store
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                product_id:
                  type: integer
                quantity:
                  type: integer
                total_price:
                  type: string
                  description: Total Price
                  example: 1000
                status:
                  type: string
                  description: Status
                  example: shipped
                  enum:
                    - processing
                    - shipped
                    - delivered
                    - pending
      responses:
        "200":
          description: Order Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Unauthenticated
        "404":
          description: Order not found
        "405":
          description: Validation exception
      security:
        - bearerAuth: []
    delete:
      tags:
        - Order System
      summary: Deletes a Order
      description: delete a Order
      operationId: deleteOrder
      parameters:
        - name: id
          in: path
          description: Order id to delete
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Unauthenticated
        "404":
          description: Order not found
      security:
        - bearerAuth: []

  /auth/register:
    post:
      tags:
        - User Authentication
      summary: Register user
      description: The register new user.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  example: "john.doe@email.com"
                password:
                  type: string
                  format: password
                  example: "$John#20@05"
      responses:
        "201":
          description: User Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: "4|eULVXBa0VRtYc6C3ND5rZe0rvvhO7cUHh83B52jO"
                      user:
                        $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized Access
        "405":
          description: Validation exception

  /auth/login:
    post:
      tags:
        - User Authentication
      summary: Login user
      description: ""
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: "johndoie@gmail.com"
                password:
                  type: string
                  format: password
                  example: "johndoie@123"
      responses:
        "200":
          description: User Logged In Successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: "4|eULVXBa0VRtYc6C3ND5rZe0rvvhO7cUHh83B52jO"
                      user:
                        $ref: "#/components/schemas/User"
        "403":
          description: Invalid login details
        "404":
          description: Validation exception
  /auth/logout:
    post:
      tags:
        - User Authentication
      summary: Logout user
      description: ""
      operationId: logoutUser
      parameters: []
      responses:
        "200":
          description: User Logged Out Successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

      security:
        - bearerAuth: []
  /auth/user:
    get:
      tags:
        - User Authentication
      summary: Get current user logged in
      description: ""
      operationId: getUser
      parameters: []
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated
        "404":
          description: User not found
      security:
        - bearerAuth: []

  /products:
    get:
      tags:
        - Product Management
      summary: List products
      description: Get all Products with their associated
      operationId: getAllProduct
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Search keyword (default empty string)
        - in: query
          name: pageIndex
          schema:
            type: integer
            default: 0
          description: Page index (default 0)
        - in: query
          name: pageSize
          schema:
            type: integer
            default: 3
          description: Page size (default 3)
        - in: query
          name: sortBy
          schema:
            type: string
            default: id
          description: Attribute to sort by (default 'id')
        - in: query
          name: sortDirection
          schema:
            type: string
            default: ASC
          description: Sort direction (default 'ASC')
      responses:
        "200":
          description: Product All Retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: Unauthenticated
        "500":
          description: Error
      security:
        - bearerAuth: []
    post:
      tags:
        - Product Management
      summary: Create product
      description: New Product to the store
      operationId: storeProduct
      requestBody:
        description: New Product in the store
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                stock:
                  type: integer
                sku:
                  type: string
                  example: "SKU-####"
                price:
                  type: string
                  description: Price
                  example: 1000
      responses:
        "201":
          description: Product store
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: Unauthenticated
        "404":
          description: Product not found
        "405":
          description: Validation exception
      security:
        - bearerAuth: []

  /products/{id}:
    get:
      tags:
        - Product Management
      summary: Get single product
      description: Returns a single Product
      operationId: getProductById
      parameters:
        - name: id
          in: path
          description: ID of Product to return
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product Retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: Unauthenticated
        "404":
          description: Product not found
      security:
        - bearerAuth: []
    put:
      tags:
        - Product Management
      summary: Update product
      description: Update an existing Product by Id
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          description: ID of Product to update
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: Update an existent Product in the store
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                stock:
                  type: integer
                sku:
                  type: string
                  example: "SKU-####"
                price:
                  type: string
                  description: Price
                  example: 1000
      responses:
        "200":
          description: Product Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: Unauthenticated
        "404":
          description: Product not found
        "405":
          description: Validation exception
      security:
        - bearerAuth: []
    patch:
      tags:
        - Product Management
      summary: Update product
      description: Partial Update an existing Product by Id
      operationId: updatePatchProduct
      parameters:
        - name: id
          in: path
          description: ID of Product to update
          required: true
          schema:
            type: integer
      requestBody:
        description: Update an existent Product in the store
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                stock:
                  type: integer
                sku:
                  type: string
                  example: "SKU-####"
                price:
                  type: string
                  description: Price
                  example: 1000
      responses:
        "200":
          description: Product Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: Unauthenticated
        "404":
          description: Product not found
        "405":
          description: Validation exception
      security:
        - bearerAuth: []
    delete:
      tags:
        - Product Management
      summary: Delete product
      description: delete a Product
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          description: Product id to delete
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Product"
        "401":
          description: Unauthenticated
        "404":
          description: Product not found
      security:
        - bearerAuth: []

  /view-all-order-user:
    get:
      tags:
        - Order System
      summary: Get user orders
      description: Returns a single user all Order
      operationId: viewAllOrderUser
      parameters:
        - name: id
          in: path
          description: ID of Order to return
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Order Retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Unauthenticated
        "404":
          description: Order not found
      security:
        - bearerAuth: []

  /cancel-order-user/{OrderId}:
    put:
      tags:
        - Order System
      summary: Cancel an Order for user
      description: Cancel an Order
      operationId: cancelanOrder
      parameters:
        - name: id
          in: path
          description: ID of Order
          required: true
          schema:
            type: string
            format: uuid

      responses:
        "200":
          description: Cancelled Order
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
        "405":
          description: Validation exception
      security:
        - bearerAuth: []

components:
  schemas:
    Order:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        user_id:
          type: integer
        quantity:
          type: integer
        total_price:
          type: double
        status:
          type: string
          description: Status
          example: shipped
          enum:
            - processing
            - shipped
            - delivered
            - pending
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
          format: id
        name:
          type: string
          example: Jon Doe
        email:
          type: string
          format: email
          example: john@email.com
        email_verified_at:
          type: string
          format: date-time
        password:
          type: string
          format: password
          example: "12345"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      xml:
        name: user

    Product:
      required:
        - name
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          example: John Don
        description:
          type: string
          example: Apple is good
        price:
          type: double
          format: 100.50
        sku:
          type: string
          example: "SKU-####"
        stock:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      xml:
        name: Product
  requestBodies:
    Product:
      description: Product object that needs to be added to the store
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Product"
        application/xml:
          schema:
            $ref: "#/components/schemas/Product"
    UserArray:
      description: List of user object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: "#/components/schemas/User"
  securitySchemes:
    bearerAuth: # arbitrary name for the security scheme
      type: http
      scheme: bearer
